<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resenhas Substack</title>
  <style>
    :root {
      --bg: #5b2a86;
      --bg-soft: #6a329b;
      --card: rgba(255, 255, 255, 0.12);
      --card-border: rgba(255, 255, 255, 0.18);
      --text: #f7f1ff;
      --muted: #e7d9ff;
      --hover: rgba(255, 255, 255, 0.18);
      --shadow: rgba(22, 7, 35, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #4a216d 100%);
      color: var(--text);
    }

    body {
      padding: 28px 18px 40px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 26px;
    }

    .title-link {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .links-box {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px var(--shadow);
    }

    .links-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .links-list li a {
      display: block;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }

    .links-list li a:hover,
    .links-list li a:focus {
      background: var(--hover);
      border-color: rgba(255, 255, 255, 0.24);
      transform: translateY(-1px);
      outline: none;
    }

    .empty,
    .error {
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 22px 14px 32px;
      }

      .links-box {
        padding: 12px;
        border-radius: 16px;
      }

      .links-list li a {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <a class="title-link" href="https://substack.com" target="_blank" rel="noopener noreferrer">
        <h1>Resenhas Substack</h1>
      </a>
    </header>

    <section class="links-box">
      <div id="content" class="empty">Carregando links...</div>
    </section>
  </main>

  <script>
    async function loadLinks() {
      const content = document.getElementById('content');
      const BASE_URL = 'https://sammylivros.substack.com/p/';

      try {
        const response = await fetch('./links.json', { cache: 'no-store' });

        if (!response.ok) {
          throw new Error('Falha ao carregar links.json');
        }

        const links = await response.json();

        if (!Array.isArray(links) || links.length === 0) {
          content.className = 'empty';
          content.textContent = 'Nenhuma resenha cadastrada ainda.';
          return;
        }

        const sortedLinks = [...links].sort((a, b) =>
          (a.title || '').localeCompare(b.title || '', 'pt-BR', { sensitivity: 'base' })
        );

        const ul = document.createElement('ul');
        ul.className = 'links-list';

        sortedLinks.forEach(item => {
          if (!item.title || !item.slug) return;

          const li = document.createElement('li');
          const a = document.createElement('a');

          const finalUrl = BASE_URL + item.slug;

          a.href = finalUrl;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = item.title;

          li.appendChild(a);
          ul.appendChild(li);
        });

        if (!ul.children.length) {
          content.className = 'empty';
          content.textContent = 'Nenhuma resenha válida encontrada no arquivo JSON.';
          return;
        }

        content.className = '';
        content.innerHTML = '';
        content.appendChild(ul);


      } catch (error) {
        content.className = 'error';
        content.textContent = 'Erro ao carregar a lista. Verifique o arquivo links.json.';
        console.error(error);
      }
    }

    loadLinks();
  </script>
</body>
</html>
