<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@sammylivros</title>
  <style>
    :root {
      --bg: #171021;
      --bg-deep: #09050f;
      --panel: rgba(31, 20, 43, 0.94);
      --panel-soft: rgba(43, 29, 58, 0.94);
      --text: #f5edf8;
      --muted: #c9b8d4;
      --gold: #c89b6d;
      --line: rgba(201, 155, 220, 0.3);
      --buy: #8b4cc2;
      --buy-dark: #6d379e;
      --review: #2a1c39;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Montserrat, Inter, "Segoe UI", Arial, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      padding: 30px 18px 44px;
      background:
        radial-gradient(circle at 16% 18%, rgba(139, 76, 194, 0.28), transparent 190px),
        radial-gradient(circle at 84% 8%, rgba(201, 155, 220, 0.16), transparent 230px),
        linear-gradient(135deg, #20122e 0%, #130b1f 52%, #08050d 100%);
      background-attachment: fixed;
    }

    body::before {
      display: none;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
    }

    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
      padding-bottom: 18px;
    }

    .title-link {
      color: inherit;
      text-decoration: none;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.5rem, 6vw, 4.2rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.78);
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 1.02rem;
      font-weight: 500;
    }

    .subtitle::before {
      display: block;
      width: 42px;
      height: 1px;
      margin-bottom: 10px;
      background: var(--gold);
      content: "";
    }

    .home-link {
      flex: 0 0 auto;
      padding: 12px 16px;
      border: 1px solid rgba(201, 155, 220, 0.48);
      border-radius: 8px;
      background: rgba(32, 20, 45, 0.88);
      color: var(--text);
      font-family: inherit;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .home-link:hover,
    .home-link:focus,
    .home-link.is-active {
      border-color: var(--gold);
      background: rgba(54, 34, 74, 0.94);
      outline: none;
      transform: translateY(-1px);
    }

    .home-link.is-active {
      box-shadow: 0 0 0 1px rgba(200, 155, 109, 0.42), 0 10px 28px rgba(0, 0, 0, 0.22);
    }

    .header-icon {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .book-card {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      gap: 14px;
      min-height: 168px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(44, 28, 60, 0.94), rgba(18, 10, 28, 0.94)),
        var(--panel);
      box-shadow: 0 16px 34px var(--shadow), inset 0 0 0 1px rgba(245, 237, 248, 0.04);
    }

    .book-cover-link {
      display: block;
      align-self: start;
      border-radius: 6px;
      outline-offset: 3px;
    }

    .book-cover {
      display: block;
      width: 104px;
      aspect-ratio: 2 / 3;
      border-radius: 6px;
      object-fit: cover;
      background: #140d1f;
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.48);
    }

    .book-info {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .book-title {
      margin: 0;
      color: var(--text);
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.25;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    }

    .book-author {
      display: block;
      margin-top: 3px;
      color: var(--gold);
      font-size: 0.92rem;
      font-weight: 500;
    }

    .book-actions {
      display: grid;
      gap: 7px;
      max-width: 150px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      box-shadow: none;
      transition: transform 0.18s ease, filter 0.18s ease, background 0.18s ease;
    }

    .button:hover,
    .button:focus {
      filter: brightness(0.94);
      outline: none;
      transform: translateY(-1px);
    }

    .button-review {
      background: rgba(201, 155, 220, 0.13);
      color: var(--text);
    }

    .button-buy {
      background: var(--buy);
      color: #fff8dd;
      font-size: 0.98rem;
    }

    .button-icon {
      width: 16px;
      height: 16px;
      margin-right: 7px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .promo-panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(48, 30, 65, 0.96), rgba(17, 10, 27, 0.96)),
        var(--panel);
      box-shadow: 0 16px 34px var(--shadow), inset 0 0 0 1px rgba(245, 237, 248, 0.04);
    }

    .promo-heading {
      padding: 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(139, 76, 194, 0.14);
    }

    .promo-heading h2 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.7rem, 4vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .promo-heading p {
      margin: 8px 0 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 500;
    }

    .promo-table-wrap {
      overflow-x: auto;
    }

    .promo-table {
      width: 100%;
      min-width: 680px;
      table-layout: fixed;
      border-collapse: collapse;
      color: #211225;
      background: #d9c2df;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.08rem;
    }

    .promo-table td {
      padding: 13px 14px;
      border: 1px solid rgba(74, 43, 89, 0.38);
      vertical-align: middle;
    }

    .promo-table td:nth-child(2) {
      width: 44%;
      font-family: Montserrat, Inter, "Segoe UI", Arial, sans-serif;
      line-height: 1.35;
    }

    .promo-price {
      width: 82px;
      font-family: Montserrat, Inter, "Segoe UI", Arial, sans-serif;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    .promo-cta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-top: 1px solid var(--line);
      background: rgba(18, 10, 28, 0.72);
    }

    .promo-cta p {
      margin: 0;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .promo-cta p span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 500;
    }

    .promo-cta-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex: 0 0 auto;
      padding: 11px 15px;
      border-radius: 6px;
      background: var(--buy);
      color: #fff8dd;
      font-weight: 800;
      text-decoration: none;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .promo-cta-link:hover,
    .promo-cta-link:focus {
      filter: brightness(0.94);
      outline: none;
      transform: translateY(-1px);
    }

    .promo-cta-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }


    .empty,
    .error {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--muted);
    }

    @media (max-width: 620px) {
      body {
        padding: 24px 14px 36px;
      }

      .hero {
        align-items: stretch;
        flex-direction: column;
      }

      .home-link {
        width: fit-content;
      }

      .hero-actions {
        justify-content: flex-start;
      }

      .promo-table {
        min-width: 0;
        font-size: 0.78rem;
      }

      .promo-table td {
        padding: 9px 6px;
      }

      .promo-table td:first-child {
        width: 34%;
      }

      .promo-table td:nth-child(2) {
        width: 42%;
        line-height: 1.28;
      }

      .promo-price {
        width: 46px;
        padding-right: 4px;
        padding-left: 4px;
        font-size: 0.76rem;
      }

      .promo-cta {
        align-items: stretch;
        flex-direction: column;
        padding: 16px;
      }

      .promo-cta-link {
        width: 100%;
        text-align: center;
      }
    }

    @media (max-width: 380px) {
      .book-card {
        grid-template-columns: 86px minmax(0, 1fr);
      }

      .book-cover {
        width: 86px;
      }

      .book-actions,
      .button {
        width: 100%;
        max-width: none;
      }

      .promo-heading {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <div>
        <a class="title-link" href="#" data-view="promo">
          <h1>@sammylivros</h1>
        </a>
        <p class="subtitle">Divulgações literárias, resenhas e links para quem ama descobrir a próxima leitura.</p>
      </div>
      <div class="hero-actions">
        <a class="home-link promo-link" href="#" data-view="promo">
          <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m3 11 18-5v12L3 13v-2z"></path>
            <path d="M11.6 16.8a3 3 0 0 1-5.7-1.6"></path>
          </svg>
          <span>Divulgações</span>
        </a>
        <a class="home-link" href="#" data-view="books">
          <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path>
            <path d="M8 7h8"></path>
            <path d="M8 10h6"></path>
          </svg>
          <span>Minha Estante</span>
        </a>
      </div>
    </header>

    <section aria-label="Conteúdo principal">
      <div id="content"></div>
    </section>
  </main>

  <script>
    function renderPromo() {
      const content = document.getElementById('content');
      const rows = [
        ['Story simples', '1 story com capa + link do livro', 'R$10'],
        ['Sequência de stories', '3 stories ao longo do dia', 'R$18'],
        ['Story + destaque', '1 story + destaque por 30 dias', 'R$15'],
        ['Post foto simples no feed', '1 imagem estática da capa o livro + sinopse', 'R$20'],
        ['Arte de quote no feed', '1 post com frase do livro em estética literária', 'R$20'],
        ['Post carrossel simples', '3 a 5 cards apresentando livro, tropes e sinopse', 'R$35'],
        ['Reel simples', '1 vídeo curto (10s) com capa, frases, trilha e chamada', 'R$40']
      ];

      content.className = '';
      content.innerHTML = `
        <div class="promo-panel">
          <div class="promo-heading">
            <h2>✨ Divulgue seu livro comigo ✨</h2>
            <p>Escolha o formato de divulgação que combina melhor com o seu lançamento.</p>
          </div>
          <div class="promo-table-wrap">
            <table class="promo-table">
              <tbody>
                ${rows.map(([name, description, price]) => `
                  <tr>
                    <td>${name}</td>
                    <td>${description}</td>
                    <td class="promo-price">${price}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          <div class="promo-cta">
            <p>
              Se interessou pela divulgação do seu livro?
              <span>Me chama na DM e a gente combina o melhor formato.</span>
            </p>
            <a class="promo-cta-link" href="https://www.instagram.com/direct/t/18087185579064380/" target="_blank" rel="noopener noreferrer">
              <span>Chamar na DM</span>
              <svg class="promo-cta-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m22 2-7 20-4-9-9-4 20-7z"></path>
                <path d="M22 2 11 13"></path>
              </svg>
            </a>
          </div>
        </div>
      `;
    }

    async function loadLinks() {
      const content = document.getElementById('content');
      const FALLBACK_COVER = './images/capas/placeholder.svg';
      const icons = {
        buy: '<svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h8.9a2 2 0 0 0 1.96-1.6l1.1-5.45H5.12"></path></svg>',
        review: '<svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path></svg>'
      };

      try {
        const response = await fetch('./links.json', { cache: 'no-store' });

        if (!response.ok) {
          throw new Error('Falha ao carregar links.json');
        }

        const links = await response.json();

        if (!Array.isArray(links) || links.length === 0) {
          content.className = 'empty';
          content.textContent = 'Nenhuma resenha cadastrada ainda.';
          return;
        }

        const sortedLinks = [...links].sort((a, b) =>
          (a.title || '').localeCompare(b.title || '', 'pt-BR', { sensitivity: 'base' })
        );

        const ul = document.createElement('ul');
        ul.className = 'books-grid';

        sortedLinks.forEach(item => {
          if (!item.title || !item.reviewUrl) return;

          const reviewUrl = item.reviewUrl;
          const coverUrl = item.image || FALLBACK_COVER;

          const li = document.createElement('li');
          li.className = 'book-card';

          const coverLink = document.createElement('a');
          coverLink.className = 'book-cover-link';
          coverLink.href = reviewUrl;
          coverLink.target = '_blank';
          coverLink.rel = 'noopener noreferrer';

          const img = document.createElement('img');
          img.className = 'book-cover';
          img.src = coverUrl;
          img.alt = `Capa do livro ${item.title}`;
          img.loading = 'lazy';
          img.onerror = () => {
            img.onerror = null;
            img.src = FALLBACK_COVER;
          };

          const info = document.createElement('div');
          info.className = 'book-info';

          const title = document.createElement('h2');
          title.className = 'book-title';
          title.textContent = item.title;

          if (item.author) {
            const author = document.createElement('span');
            author.className = 'book-author';
            author.textContent = item.author;
            title.appendChild(author);
          }

          const actions = document.createElement('div');
          actions.className = 'book-actions';

          if (item.amazonUrl) {
            const buy = document.createElement('a');
            buy.className = 'button button-buy';
            buy.href = item.amazonUrl;
            buy.target = '_blank';
            buy.rel = 'noopener noreferrer';
            buy.innerHTML = `${icons.buy}<span>Compre aqui</span>`;
            actions.appendChild(buy);
          }

          const review = document.createElement('a');
          review.className = 'button button-review';
          review.href = reviewUrl;
          review.target = '_blank';
          review.rel = 'noopener noreferrer';
          review.innerHTML = `${icons.review}<span>Ler resenha</span>`;

          actions.appendChild(review);

          coverLink.appendChild(img);
          info.append(title, actions);
          li.append(coverLink, info);
          ul.appendChild(li);
        });

        if (!ul.children.length) {
          content.className = 'empty';
          content.textContent = 'Nenhuma resenha válida encontrada no arquivo JSON.';
          return;
        }

        content.className = '';
        content.innerHTML = '';
        content.appendChild(ul);
      } catch (error) {
        content.className = 'error';
        content.textContent = 'Erro ao carregar a lista. Verifique o arquivo links.json.';
        console.error(error);
      }
    }

    function setActiveView(view) {
      document.querySelectorAll('.home-link[data-view]').forEach(link => {
        link.classList.toggle('is-active', link.dataset.view === view);
      });
    }

    document.querySelectorAll('[data-view]').forEach(link => {
      link.addEventListener('click', event => {
        event.preventDefault();

        if (link.dataset.view === 'books') {
          setActiveView('books');
          loadLinks();
          return;
        }

        setActiveView('promo');
        renderPromo();
      });
    });

    setActiveView('promo');
    renderPromo();
  </script>
</body>
</html>
